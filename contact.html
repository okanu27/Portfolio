
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="Styles/main.css">
</head>
<body>

<div class="con-container">
<div class="contact-container">
    <form action="/compose" method="post">
        <div class="contact-group">
            <label>Email</label>
            <input class="contact-control" type="text" name="contactEmail" placeholder="Email@mail.com" required>
        </div>
        <div class="contact-group">
            <label>Message</label>
            <textarea class="contact-control" name="newsBody" rows="5" placeholder="Write your message" required></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Submit</button>
    </form>
    <h2><a href="index.html">Home</a></h2>
</div>

<div class="footer">
        <ul class="footer-list">
            <li> <a href="www.linkedin.com">LinkedIn</a> </li>

            <li> <a href="https://locahost:3000">Blog</a></li>
        </ul>
        <p class="copyright">© 2026 Okanu @ Prime App</p>
    </div>

</div>
</body>
</html>
